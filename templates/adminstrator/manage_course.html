{% extends 'base.html' %}
{% block content %}

<style>
    .dashboard-card {
        width: 100%;
        min-height: 220px;
        height: 22vh;
        max-height: 260px;
        border-radius: 16px;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .dashboard-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom,
                rgba(0, 0, 0, 0.25),
                rgba(0, 0, 0, 0.75));
        z-index: 1;
    }

    .dashboard-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 16px 35px rgba(0, 0, 0, 0.4);
    }

    .dashboard-card h4 {
        position: relative;
        z-index: 2;
        color: #fff;
        font-weight: 700;
        font-size: clamp(16px, 2vw, 22px);
        text-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
        letter-spacing: 0.5px;
        padding: 0 10px;
    }

    /* Scrollbar width */
    ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
    }

    /* Scrollbar Thumb */
    ::-webkit-scrollbar-thumb {
        background: #181818;
        /* darker aqua */
        border-radius: 10px;
    }

    /* Scrollbar Thumb Hover */
    ::-webkit-scrollbar-thumb:hover {
        background: #171717;
    }

    /* Mobile adjustments */
    @media (max-width: 576px) {
        .dashboard-card {
            height: 160px;
        }
    }
</style>

<div class="container-fluid mt-4 px-3">
    <div class="row justify-content-center mb-5">

        <!-- Manage Courses -->
        <div class="col-12 col-sm-6 col-md-6 col-lg-4 col-xl-3 mb-5">
            <a href="{% url 'adminstrator:manage_course' %}" style="text-decoration:none;">
                <div class="dashboard-card"
                    style="background-image: url('https://images.unsplash.com/photo-1542626991-cbc4e32524cc?q=80&w=1169&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');">
                    <h4>Manage Courses</h4>
                </div>
            </a>
        </div>

        <!-- Manage Students -->
        <div class="col-12 col-sm-6 col-md-6 col-lg-4 col-xl-3 mb-5">
            <a href="{% url 'adminstrator:manage_student' %}" style="text-decoration:none;">
                <div class="dashboard-card"
                    style="background-image: url('https://images.unsplash.com/photo-1524178232363-1fb2b075b655');">
                    <h4>Manage Students</h4>
                </div>
            </a>
        </div>

        <!-- Manage Faculty -->
        <div class="col-12 col-sm-6 col-md-6 col-lg-4 col-xl-3 mb-5">
            <a href="{% url 'adminstrator:manage_faculty' %}" style="text-decoration:none;">
                <div class="dashboard-card"
                    style="background-image: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b');">
                    <h4>Manage Faculty</h4>
                </div>
            </a>
        </div>

    </div>
</div>

{% endblock %}
