<tr>

<td>{{ a.experience }}</td>
<td>{{ a.status|capfirst }}</td>

    <a class="btn btn-sm btn-danger" href="{% url 'adminstrator:reject_faculty' a.id %}">Decline</a>
</td>

</td>

</tr>
