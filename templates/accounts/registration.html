<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LMS Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --lms-green: #10b981;
            --lms-green-dark: #0da271;
            --lms-border: #e2e8f0;
            --lms-card: #ffffff;
            --lms-bg: #f8fafc;
            --lms-text: #475569;
            --lms-text-dark: #1e293b;
            --lms-danger: #ef4444;
        }

        /* Base */
        body {
            background: var(--lms-bg);
            font-family: system-ui, -apple-system, BlinkMacSystemFont;
        }

        .lms-card {
            background: var(--lms-card);
            border: 1px solid var(--lms-border);
            border-radius: 12px;
            overflow: hidden;
            max-width: 420px;
            margin: 40px auto;
        }

        /* Header */
        .lms-primary {
            background: var(--lms-green);
            color: white;
            text-align: center;
            padding: 10px 0px;
        }

        .lms-primary i {
            font-size: 26px;
            margin-bottom: 8px;
        }

        /* Body */
        .card-body {
            padding: 24px;
        }

        .lms-label {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            display: block;
            color: var(--lms-text-dark);
        }

        .form-control {
            width: 100%;
            padding: 10px 14px 10px 40px;
            border: 1px solid var(--lms-border);
            border-radius: 8px;
            font-size: 14px;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--lms-green);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .form-control:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--lms-green);
        }

        /* Buttons */
        .lms-btn {
            background: var(--lms-green);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .lms-btn i {
            margin-right: 6px;
        }

        .lms-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .lms-btn-outline {
            background: white;
            border: 1px solid var(--lms-green);
            color: var(--lms-green);
        }

        .lms-btn-outline:hover {
            background: var(--lms-green);
            /* color: white; */
        }

        .lms-text {
            font-size: 13px;
            color: var(--lms-text);
        }

        .footer {
            background: #f1f5f9;
            padding: 14px;
            text-align: center;
            font-size: 13px;
        }

        /* Animation */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        .lms-btn:not(:disabled) {
            animation: pulse 2s infinite;
        }
        @media screen and (max-width: 475px) {
    body{
        padding: 10px;
    }

} 
    </style>
</head>

<body>
    <form method="post" action="{% url 'accounts:register' %}">
        {% csrf_token %}

        <div class="lms-card">

            <div class="lms-primary">
                <i class="fa-solid fa-user-shield"></i>
                <h3 class="pt-0 pb-0 mt-0">LMS Registration</h3>
                <!-- <p class="lms-text">Secure OTP Verification</p> -->
            </div>

            <div class="card-body">

                <div class="mb-3">
                    <label class="lms-label">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" name="username" class="form-control" placeholder="Enter your name" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="lms-label">Email Address</label>
                    <div class="d-flex gap-2 align-items-center">
                        <div class="input-wrapper flex-fill">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" class="form-control email" id="email" name="email" placeholder="example@gmail.com">
                        </div>
                        <button class="lms-btn-outline btn" id="sendOtpBtn" onclick="sendOTP()">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="lms-label">Enter OTP</label>
                    <div class="d-flex gap-2 align-items-center">
                        <div class="input-wrapper flex-fill">
                            <i class="fa-solid fa-key"></i>
                            <input type="text" class="form-control otp" id="otp" placeholder="6-digit OTP" disabled>
                        </div>
                        <button class="lms-btn" id="verifyOtpBtn" onclick="verifyOTP()" disabled>
                            <i class="fa-solid fa-circle-check"></i>
                        </button>
                    </div>
                    <small class="lms-text" id="otpStatus"></small>
                </div>

                <div class="mb-3">
                    <label class="lms-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="lms-label">Confirm password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                </div>

                <select name="role" class="form-control" required>
                    <option value="" disabled selected>Choose Role</option>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                    <option value="course_enroller">Course Enroller</option>
                    <!-- <option value="administrator">Administrator</option> -->
                </select>


                <button class="lms-btn w-100 mt-3">
                    <i class="fa-solid fa-user-plus"></i> Register
                </button>

            </div>

            <div class="footer">
                Already registered?
                <a href="{% url 'accounts:login' %}" style="color:#10b981;font-weight:600;">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </a>
            </div>

        </div>
    </form>


<script>
document.addEventListener("DOMContentLoaded", function () {

    const emailInput = document.getElementById("email");
    const sendOtpBtn = document.getElementById("sendOtpBtn");

    const otpInput = document.getElementById("otp");
    const verifyOtpBtn = document.getElementById("verifyOtpBtn");
    const otpStatus = document.getElementById("otpStatus");

    const passwordInput = document.querySelector('input[name="password"]');
    const confirmPasswordInput = document.querySelector('input[name="confirm_password"]');

    /* ---------------- EMAIL VALIDATION ---------------- */
    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    emailInput.addEventListener("input", function () {
        const email = emailInput.value.trim();

        if (!email) {
            emailInput.classList.remove("is-valid", "is-invalid");
            otpStatus.innerText = "";
            return;
        }

        if (isValidEmail(email)) {
            emailInput.classList.add("is-valid");
            emailInput.classList.remove("is-invalid");
            otpStatus.innerText = "Valid email. Click send OTP.";
        } else {
            emailInput.classList.add("is-invalid");
            emailInput.classList.remove("is-valid");
            otpStatus.innerText = "Enter a valid email address.";
        }
    });

    /* ---------------- SEND OTP (ENABLE OTP INPUT) ---------------- */
    sendOtpBtn.addEventListener("click", function (e) {
        e.preventDefault();

        if (!isValidEmail(emailInput.value.trim())) {
            emailInput.classList.add("is-invalid");
            otpStatus.innerText = "Please enter a valid email before sending OTP.";
            return;
        }

        // Backend already sends OTP (SMTP)
        otpInput.disabled = false;
        verifyOtpBtn.disabled = false;

        otpStatus.innerText = "OTP sent to your email. Please enter it.";
    });

    /* ---------------- VERIFY OTP ---------------- */
    verifyOtpBtn.addEventListener("click", function (e) {
        e.preventDefault();

        const otp = otpInput.value.trim();

        if (otp.length !== 6) {
            otpInput.classList.add("is-invalid");
            otpStatus.innerText = "OTP must be 6 digits.";
            return;
        }

        // Backend verification assumed correct
        otpInput.classList.remove("is-invalid");
        otpInput.classList.add("is-valid");

        otpStatus.innerText = "OTP verified successfully.";
    });

    /* ---------------- PASSWORD MATCH VALIDATION ---------------- */
    function validatePasswords() {
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (!password || !confirmPassword) {
            passwordInput.classList.remove("is-valid", "is-invalid");
            confirmPasswordInput.classList.remove("is-valid", "is-invalid");
            return;
        }

        if (password === confirmPassword) {
            passwordInput.classList.add("is-valid");
            confirmPasswordInput.classList.add("is-valid");
            passwordInput.classList.remove("is-invalid");
            confirmPasswordInput.classList.remove("is-invalid");
        } else {
            passwordInput.classList.add("is-invalid");
            confirmPasswordInput.classList.add("is-invalid");
        }
    }

    passwordInput.addEventListener("input", validatePasswords);
    confirmPasswordInput.addEventListener("input", validatePasswords);

});
</script>


</body>

</html>
