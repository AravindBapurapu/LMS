<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LMS Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --lms-green: #10b981;
    --lms-green-dark: #0da271;
    --lms-border: #e2e8f0;
    --lms-card: #ffffff;
    --lms-bg: #f8fafc;
    --lms-text: #475569;
    --lms-text-dark: #1e293b;
    --lms-danger: #ef4444;
}

/* Base */
body {
    background: var(--lms-bg);
    font-family: system-ui, -apple-system, BlinkMacSystemFont;
}

.lms-card {
    background: var(--lms-card);
    border: 1px solid var(--lms-border);
    border-radius: 12px;
    overflow: hidden;
    max-width: 420px;
    margin: 40px auto;
}

/* Header */
.lms-primary {
    background: var(--lms-green);
    color: white;
    text-align: center;
    padding: 10px 0px;
}

.lms-primary i {
    font-size: 26px;
    margin-bottom: 8px;
}

/* Body */
.card-body {
    padding: 24px;
}

.lms-label {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
    display: block;
    color: var(--lms-text-dark);
}

.form-control {
    width: 100%;
    padding: 10px 14px 10px 40px;
    border: 1px solid var(--lms-border);
    border-radius: 8px;
    font-size: 14px;
}

.form-control:focus {
    outline: none;
    border-color: var(--lms-green);
    box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
}

.form-control:disabled {
    background: #f1f5f9;
    cursor: not-allowed;
}

.input-wrapper {
    position: relative;
}

.input-wrapper i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--lms-green);
}

/* Buttons */

.lms-btn {
    background: var(--lms-green);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}

.lms-btn i {
    margin-right: 6px;
}

.lms-btn:disabled {
    background: #9ca3af;
    cursor: not-allowed;
}

.lms-btn-outline {
    background: white;
    border: 1px solid var(--lms-green);
    color: var(--lms-green);
}

.lms-btn-outline:hover {
    background: var(--lms-green);
}

.lms-text {
    font-size: 13px;
    color: var(--lms-text);
}

.footer {
    background: #f1f5f9;
    padding: 14px;
    text-align: center;
    font-size: 13px;
}

/* Animation */
@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    70% { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}

.lms-btn:not(:disabled) {
    animation: pulse 2s infinite;
}

@media screen and (max-width: 475px) {
    body{
        padding: 10px;
    }

} 


</style>
</head>

<body>
<form method="post" action="{% url 'accounts:login' %}">
    {% csrf_token %}
    <div class="lms-card">

    <div class="lms-primary">
        <i class="fa-solid fa-user-shield"></i>
        <h3 class="pt-0 pb-0 mt-0">LMS Login</h3>
    </div>

    <div class="card-body">

        <div class="mb-3">
            <label class="lms-label">Username or Email</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" class="form-control"
       placeholder="Enter your username" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="lms-label">Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="password" name="password" class="form-control"
       placeholder="Enter your password" required>
            </div>
        </div>

        <!-- <div class="mb-3">
            <label class="lms-label">Reason</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-list-check"></i>
                <select class="form-control select">
                    <option value="" disabled selected>-- Choose Reason --</option>
                    <option>Course Enroll</option>
                    <option>Faculty</option>
                    <option>Student</option>
                </select>
            </div>
        </div>
 -->
        <button class="btn lms-btn w-100">
            <i class="fa-solid fa-user-plus"></i> Login
        </button>

    </div>

    <div class="footer">
        Create new account/
        <a href="{% url 'accounts:register' %}" style="color:#10b981;font-weight:600;">
            <i class="fa-solid fa-right-to-bracket"></i> Register here</a>
    </div>

</div>
</form>


</body>
</html>
